      <stop offset="0%" stop-color="#34d399"></stop>
      <stop offset="100%" stop-color="#2563eb"></stop>
    </linearGradient>
  </defs>

  <path d="M60 100
       C20 70 10 40 30 25
       C45 12 65 20 70 40
       C75 20 95 12 110 25
